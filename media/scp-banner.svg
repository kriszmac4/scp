<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Glow orb behind logo -->
  <circle cx="640" cy="200" r="180" fill="url(#glow)" filter="url(#bigGlow)"/>

  <!-- Central brain/hexagon -->
  <g filter="url(#softGlow)">
    <!-- Outer hex -->
    <polygon points="640,80 740,130 740,270 640,320 540,270 540,130"
             fill="none" stroke="url(#accent1)" stroke-width="2.5" stroke-opacity="0.6"/>
    <!-- Inner hex -->
    <polygon points="640,110 710,145 710,215 640,250 570,215 570,145"
             fill="url(#accent1)" fill-opacity="0.15" stroke="url(#accent1)" stroke-width="1.5"/>
  </g>

  <!-- Data flow lines (ICM → Holographic → Marveen → Core) -->
  <!-- Source 1: ICM (left) -->
  <circle cx="280" cy="300" r="24" fill="none" stroke="url(#accent2)" stroke-width="2"/>
  <text x="280" y="305" font-family="monospace" font-size="9" fill="url(#accent2)" text-anchor="middle" filter="url(#softGlow)">ICM</text>
  <path d="M304,300 C360,280 420,240 540,200" fill="none" stroke="url(#accent2)" stroke-width="2" stroke-dasharray="6,4" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Source 2: Holographic (top-right) -->
  <circle cx="900" cy="180" r="24" fill="none" stroke="url(#accent1)" stroke-width="2"/>
  <text x="900" y="185" font-family="monospace" font-size="9" fill="url(#accent1)" text-anchor="middle" filter="url(#softGlow)">HOLO</text>
  <path d="M876,180 C820,200 760,220 740,200" fill="none" stroke="url(#accent1)" stroke-width="2" stroke-dasharray="6,4" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- Source 3: Marveen (bottom) -->
  <circle cx="640" cy="420" r="24" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <text x="640" y="425" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle" filter="url(#softGlow)">BUS</text>
  <path d="M640,396 C640,360 640,340 640,320" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,4" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Small pulsing dots on data lines -->
  <circle r="4" fill="url(#accent2)" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" path="M304,300 C360,280 420,240 540,200"/>
  </circle>
  <circle r="4" fill="url(#accent1)" opacity="0.8">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M876,180 C820,200 760,220 740,200"/>
  </circle>
  <circle r="4" fill="#22d3ee" opacity="0.8">
    <animateMotion dur="2s" repeatCount="indefinite" path="M640,396 C640,360 640,340 640,320"/>
  </circle>

  <!-- SCP Title -->
  <text x="640" y="510" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="64" font-weight="700" fill="url(#accent1)" text-anchor="middle"
        filter="url(#softGlow)">SCP</text>
  <text x="640" y="545" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="300" fill="#a0a0c0" text-anchor="middle">
    Session Context
  </text>
  <text x="640" y="565" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="300" fill="#707090" text-anchor="middle">
    Pre-fill for Hermes Agent
  </text>

  <!-- Version badge -->
  <rect x="595" y="470" width="90" height="22" rx="11" fill="#6366f1" fill-opacity="0.3"
        stroke="#6366f1" stroke-width="0.5"/>
  <text x="640" y="485" font-family="monospace" font-size="10" fill="#a5b4fc" text-anchor="middle">v1.0.0</text>

  <!-- Bottom bar -->
  <line x1="200" y1="600" x2="1080" y2="600" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <text x="640" y="620" font-family="monospace" font-size="11" fill="#505060" text-anchor="middle">
    ICM  ·  Holographic Memory  ·  Marveen Bus  ·  prefill_messages_file
  </text>
</svg>
