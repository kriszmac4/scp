# SCP — Config example: paste into ~/.hermes/profiles/<profile>/config.yaml
# ==========================================================================

# Session Context Pre-fill — auto-injects context into every turn
# Path to the file generated by scp.py (the cron script)
prefill_messages_file: '/home/<your-user>/.hermes/profiles/<profile>/data/session_context.md'

# NOTE: This key goes at the root level of config.yaml (NOT nested under any section).
# After adding it, restart Hermes or start a new session.
# The file is read once at session start and injected as the first user message.
